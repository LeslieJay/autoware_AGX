# 低速封闭园区AGV优化配置
# 适用场景：最高速度15km/h (4.17m/s)，封闭园区，室外道路
/**:
  ros__parameters:
    avoidance:
      # 基础参数 - 低速场景使用更精细的采样
      resample_interval_for_planning: 0.2               # [m] 降低以提高精度
      resample_interval_for_output: 2.0                 # [m] 降低以提高控制精度

      # 车道使用策略 - 园区内通常不需要对向车道
      use_lane_type: "same_direction_lane"
      
      # 可行驶区域设置 - 园区内简化
      use_intersection_areas: true
      use_hatched_road_markings: false                  # 园区内可能没有标准标线
      use_freespace_areas: true                         # 利用自由空间

      # 目标物体参数 - 针对园区场景优化
      target_object:
        car:
          th_moving_speed: 0.5                          # [m/s] 降低，园区内速度慢
          th_moving_time: 1.5                           # [s] 缩短反应时间
          longitudinal_margin: 0.5                      # [m] 增加安全距离
          lateral_margin:
            soft_margin: 0.8                            # [m] 增加舒适距离
            hard_margin: 0.3                            # [m] 保持最小安全距离
            hard_margin_for_parked_vehicle: 0.6         # [m] 停放车辆距离
          max_expand_ratio: 0.0
          envelope_buffer_margin: 0.15                  # [m] 增加缓冲
          th_error_eclipse_long_radius: 0.5             # [m]
        
        truck:
          th_moving_speed: 0.5
          th_moving_time: 1.5
          longitudinal_margin: 0.5
          lateral_margin:
            soft_margin: 0.8
            hard_margin: 0.3
            hard_margin_for_parked_vehicle: 0.6
          max_expand_ratio: 0.0
          envelope_buffer_margin: 0.15
          th_error_eclipse_long_radius: 0.5
        
        bus:
          th_moving_speed: 0.5
          th_moving_time: 1.5
          longitudinal_margin: 0.5
          lateral_margin:
            soft_margin: 0.8
            hard_margin: 0.3
            hard_margin_for_parked_vehicle: 0.6
          max_expand_ratio: 0.0
          envelope_buffer_margin: 0.15
          th_error_eclipse_long_radius: 0.5
        
        trailer:
          th_moving_speed: 0.5
          th_moving_time: 1.5
          longitudinal_margin: 0.5
          lateral_margin:
            soft_margin: 0.8
            hard_margin: 0.3
            hard_margin_for_parked_vehicle: 0.6
          max_expand_ratio: 0.0
          envelope_buffer_margin: 0.15
          th_error_eclipse_long_radius: 0.5
        
        unknown:
          th_moving_speed: 0.3                          # [m/s] 对未知物体更保守
          th_moving_time: 1.0
          longitudinal_margin: 0.5
          lateral_margin:
            soft_margin: 0.8
            hard_margin: 0.2                            # [m] 保守策略
            hard_margin_for_parked_vehicle: 0.5
          max_expand_ratio: 0.0
          envelope_buffer_margin: 0.2
          th_error_eclipse_long_radius: 0.5
        
        bicycle:
          th_moving_speed: 0.3                          # [m/s] 园区内自行车速度慢
          th_moving_time: 1.0
          longitudinal_margin: 0.8                      # [m] 自行车需要更大距离
          lateral_margin:
            soft_margin: 1.0                            # [m] 给自行车更多空间
            hard_margin: 0.6
            hard_margin_for_parked_vehicle: 0.6
          max_expand_ratio: 0.0
          envelope_buffer_margin: 0.4
          th_error_eclipse_long_radius: 0.5
        
        motorcycle:
          th_moving_speed: 0.5
          th_moving_time: 1.0
          longitudinal_margin: 0.8
          lateral_margin:
            soft_margin: 0.9
            hard_margin: 0.4
            hard_margin_for_parked_vehicle: 0.5
          max_expand_ratio: 0.0
          envelope_buffer_margin: 0.4
          th_error_eclipse_long_radius: 0.5
        
        pedestrian:
          th_moving_speed: 0.2                          # [m/s] 行人速度阈值
          th_moving_time: 0.8                           # [s] 快速响应行人
          longitudinal_margin: 1.5                      # [m] 行人需要更大纵向距离
          lateral_margin:
            soft_margin: 1.2                            # [m] 给行人更多横向空间
            hard_margin: 0.8                            # [m] 最小安全距离
            hard_margin_for_parked_vehicle: 0.8
          max_expand_ratio: 0.0
          envelope_buffer_margin: 0.5
          th_error_eclipse_long_radius: 0.5
        
        lower_distance_for_polygon_expansion: 20.0      # [m] 降低，园区视距短
        upper_distance_for_polygon_expansion: 60.0      # [m] 降低，园区范围小

      # 目标过滤参数
      target_filtering:
        # 所有类型都检测
        target_type:
          car: true
          truck: true
          bus: true
          trailer: true
          unknown: true
          bicycle: true
          motorcycle: true
          pedestrian: true                              # 重点关注行人
        
        # 检测范围 - 园区场景缩小
        object_check_goal_distance: 15.0                # [m] 缩短
        object_check_return_pose_distance: 15.0         # [m] 缩短
        max_compensation_time: 1.5                      # [s] 缩短丢失补偿时间

        # 检测区域参数 - 低速场景
        detection_area:
          static: false
          min_forward_distance: 20.0                    # [m] 缩短前方检测距离
          max_forward_distance: 60.0                    # [m] 园区内不需要太远
          backward_distance: 5.0                        # [m] 缩短后方检测

        # 停放车辆过滤 - 园区内更宽松
        parked_vehicle:
          th_offset_from_centerline: 0.8                # [m] 降低，园区道路可能较窄
          th_shiftable_ratio: 0.7                       # [-] 降低，更容易识别为停放车辆
          min_road_shoulder_width: 0.3                  # [m] 园区路肩可能较窄

        # 汇入/偏离车辆
        merging_vehicle:
          th_overhang_distance: 0.0

        unstable_classification_time: 1.5               # [s] 缩短分类稳定时间

        # 模糊车辆绕避策略 - AGV自动绕避
        avoidance_for_ambiguous_vehicle:
          policy: "auto"                                # 自动绕避，不需要人工批准
          condition:
            th_stopped_time: 2.0                        # [s] 缩短
            th_moving_distance: 0.8                     # [m] 缩短
          ignore_area:
            traffic_light:
              front_distance: 15.0                      # [m] 缩短
            crosswalk:
              front_distance: 10.0                      # [m] 缩短
              behind_distance: 5.0                      # [m] 增加
          wait_and_see:
            target_behaviors: ["MERGING", "DEVIATING"]
            th_closest_distance: 8.0                    # [m] 缩短观察距离

        # 违停车辆 - 自动绕避
        avoidance_for_parking_violation_vehicle:
          policy: "auto"                                # 自动处理
          condition:
            th_road_border_distance: 0.6                # [m] 降低

        # 相邻车道停止车辆
        avoidance_for_adjacent_lane_stop_vehicle:
          policy: "auto"

        # 交叉路口参数
        intersection:
          yaw_deviation: 0.524                          # [rad] (30度) 放宽，园区交叉口可能不规则

        # 自由空间
        freespace:
          condition:
            th_stopped_time: 3.0                        # [s]

      # 安全检查
      safety_check:
        target_type:
          car: true
          truck: true
          bus: true
          trailer: true
          unknown: true                                 # 启用unknown检查
          bicycle: true
          motorcycle: true
          pedestrian: true
        
        # 安全检查配置
        enable: true
        check_current_lane: true                        # 启用当前车道检查
        check_shift_side_lane: true
        check_other_side_lane: false                    # 园区内关闭
        check_unavoidable_object: true                  # 启用，更安全
        check_other_object: true
        
        # 碰撞检查参数
        check_all_predicted_path: true                  # 检查所有预测路径，更保守
        safety_check_backward_distance: 30.0            # [m] 缩短
        hysteresis_factor_expand_rate: 1.3              # [-] 降低抖动
        hysteresis_factor_safe_count: 2                 # [-] 减少，快速响应
        collision_check_yaw_diff_threshold: 3.1416      # [rad]
        
        # 预测路径参数 - 低速场景
        min_velocity: 0.5                               # [m/s] 降低最小速度
        max_velocity: 5.0                               # [m/s] 园区最大速度约15km/h
        time_resolution: 0.3                            # [s] 提高时间分辨率
        time_horizon_for_front_object: 4.0              # [s] 增加前方预测时间
        time_horizon_for_rear_object: 6.0               # [s] 减少后方预测时间
        delay_until_departure: 0.0
        
        # RSS参数
        extended_polygon_policy: "along_path"
        expected_front_deceleration: -0.8               # [m/ss] 降低，AGV减速较缓
        expected_rear_deceleration: -0.8                # [m/ss]
        rear_vehicle_reaction_time: 1.5                 # [s] 缩短
        rear_vehicle_safety_time_margin: 0.8            # [s] 缩短
        lateral_distance_max_threshold: 1.5             # [m] 降低
        longitudinal_distance_min_threshold: 2.0        # [m] 降低
        longitudinal_velocity_delta_time: 0.0

      # 绕避机动参数
      avoidance:
        lateral:
          th_avoid_execution: 0.05                      # [m] 降低执行阈值，更灵敏
          th_small_shift_length: 0.08                   # [m] 降低小偏移阈值
          soft_drivable_bound_margin: 0.2               # [m] 降低边界裕度
          hard_drivable_bound_margin: 0.2               # [m]
          max_right_shift_length: 2.0                   # [m] 降低最大偏移，园区道路窄
          max_left_shift_length: 2.0                    # [m]
          max_deviation_from_lane: 0.15                 # [m] 降低偏离量
          ratio_for_return_shift_approval: 0.6          # [-] 提高，更早返回

        longitudinal:
          min_prepare_time: 1.5                         # [s] 增加准备时间，AGV加速慢
          max_prepare_time: 4.0                         # [s] 增加
          min_prepare_distance: 2.0                     # [m] 增加
          min_slow_down_speed: 0.5                      # [m/s] 降低最小减速速度
          buf_slow_down_speed: 0.3                      # [m/s] 降低
          nominal_avoidance_speed: 3.0                  # [m/s] 降低名义绕避速度
          consider_front_overhang: true
          consider_rear_overhang: true

        # 返回截止线
        return_dead_line:
          goal:
            enable: true
            buffer: 2.0                                 # [m] 缩短
          traffic_light:
            enable: false                               # 园区内可能没有红绿灯
            buffer: 2.0

      # 取消机动
      cancel:
        enable: true
        force:
          duration_time: 1.5                            # [s] 缩短强制取消时间

      # 让行机动
      yield:
        enable: true
        enable_during_shifting: false

      # 停止机动
      stop:
        max_distance: 15.0                              # [m] 缩短最大停止距离
        stop_buffer: 0.8                                # [m] 减少停止缓冲

      # 策略配置
      policy:
        detection_reliability: "reliable"               # 园区内感知相对可靠
        make_approval_request: "per_shift_line"         # 或 "per_avoidance_maneuver"
        deceleration: "reliable"                        # 使用可靠策略，AGV速度慢可承受
        lateral_margin: "best_effort"                   # 尽力而为
        use_shorten_margin_immediately: true            # 立即使用缩短裕度

      # 约束参数 - AGV低速场景
      constraints:
        lateral:
          velocity: [0.5, 2.0, 4.0]                     # [m/s] 降低速度档位
          max_accel_values: [0.3, 0.3, 0.3]             # [m/ss] 降低横向加速度
          min_jerk_values:
            avoid: [0.1, 0.1, 0.1]                      # [m/sss] 降低jerk，更平滑
            return: [0.1, 0.1, 0.1]
          max_jerk_values: [0.5, 0.5, 0.5]              # [m/sss] 降低

        longitudinal:
          nominal_deceleration: -0.6                    # [m/ss] AGV减速较缓
          nominal_jerk: 0.3                             # [m/sss] 降低
          max_deceleration: -1.0                        # [m/ss] 降低最大减速度
          max_jerk: 0.6                                 # [m/sss] 降低
          max_acceleration: 0.4                         # [m/ss] AGV加速较慢
          min_velocity_to_limit_max_acceleration: 1.5   # [m/ss] 降低

      # 路径生成方法
      path_generation_method: "shift_line_base"         # 使用shift_line以便控制

      shift_line_pipeline:
        trim:
          quantize_size: 0.08                           # 更精细
          th_similar_grad_1: 0.08
          th_similar_grad_2: 0.15
          th_similar_grad_3: 0.3

      # 调试
      debug:
        enable_other_objects_marker: true
        enable_other_objects_info: true
        enable_detection_area_marker: true              # 启用检测区域可视化
        enable_drivable_bound_marker: true              # 启用可行驶边界可视化
        enable_safety_check_marker: true                # 启用安全检查可视化
        enable_shift_line_marker: true                  # 启用shift line可视化
        enable_lane_marker: true                        # 启用车道可视化
        enable_misc_marker: true                        # 启用其他标记
