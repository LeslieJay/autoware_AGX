launch:
  - arg:
      name: behavior_path_planner_type
      default: behavior_path_planner

  # behavior path modules - MINIMAL: only essential modules
  - arg:
      name: launch_static_obstacle_avoidance
      default: "false"  # Disabled for minimal setup
  - arg:
      name: launch_avoidance_by_lane_change_module
      default: "false"  # Disabled
  - arg:
      name: launch_dynamic_obstacle_avoidance
      default: "false"
  - arg:
      name: launch_sampling_planner_module
      default: "false"
  - arg:
      name: launch_lane_change_right_module
      default: "true"  # Keep basic lane change
  - arg:
      name: launch_lane_change_left_module
      default: "true"  # Keep basic lane change
  - arg:
      name: launch_external_request_lane_change_right_module
      default: "false"
  - arg:
      name: launch_external_request_lane_change_left_module
      default: "false"
  - arg:
      name: launch_goal_planner_module
      default: "true"  # Essential for goal reaching
  - arg:
      name: launch_start_planner_module
      default: "true"  # Essential for starting
  - arg:
      name: launch_side_shift_module
      default: "false"  # Disabled
  - arg:
      name: launch_bidirectional_traffic_module
      default: "false"  # Disabled

  # behavior velocity modules - MINIMAL: only critical safety modules
  - arg:
      name: launch_crosswalk_module
      default: "false"  # Disabled for minimal
  - arg:
      name: launch_walkway_module
      default: "false"
  - arg:
      name: launch_traffic_light_module
      default: "false"  # Disabled (no perception)
  - arg:
      name: launch_intersection_module
      default: "true"  # Keep for safety
  - arg:
      name: launch_roundabout_module
      default: "false"
  - arg:
      name: launch_merge_from_private_module
      default: "false"
  - arg:
      name: launch_blind_spot_module
      default: "false"
  - arg:
      name: launch_detection_area_module
      default: "false"
  - arg:
      name: launch_virtual_traffic_light_module
      default: "false"
  - arg:
      name: launch_no_stopping_area_module
      default: "false"
  - arg:
      name: launch_stop_line_module
      default: "true"  # Keep for safety
  - arg:
      name: launch_occlusion_spot_module
      default: "false"
  - arg:
      name: launch_speed_bump_module
      default: "false"
  - arg:
      name: launch_no_drivable_lane_module
      default: "false"

  # motion planning modules - SIMPLIFIED
  - arg:
      name: motion_path_smoother_type
      default: none  # Disable smoothing for performance
      # option: elastic_band, none

  - arg:
      name: motion_path_planner_type
      default: path_optimizer
      # option: path_optimizer

  # motion velocity modules
  - arg:
      name: motion_velocity_smoother_type
      default: analytical  # Use faster analytical smoother
      # options: JerkFiltered, L2, Analytical, linf

  - arg:
      name: motion_velocity_planner_type
      default: motion_velocity_planner_node
      # option: motion_velocity_planner_node

  # planning evaluator - DISABLED
  - arg:
      name: launch_planning_evaluator
      default: "false"

  # planning validator
  - arg:
      name: launch_planning_validator
      default: "true"  # Keep for safety
